<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pestastic — Pest Control Management</title>
  <meta http-equiv="refresh" content="0; url=login.html" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f1b12 0%,#1a2e1d 50%,#0d1f0f 100%);display:flex;align-items:center;justify-content:center}
    .card{background:white;border-radius:16px;padding:48px 40px;width:100%;max-width:400px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.25)}
    .logo{background:white;border-radius:12px;padding:10px 20px;display:inline-flex;align-items:center;justify-content:center;margin:0 auto 20px;border:1px solid #e5e7eb}
    .logo svg{width:40px;height:40px}
    h1{font-size:26px;font-weight:900;color:#111;letter-spacing:-.3px;margin-bottom:6px}
    p{font-size:14px;color:#9ca3af;margin-bottom:28px}
    .spinner{width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:hsl(142,76%,36%);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .redirect-msg{font-size:13px;color:#6b7280}
    a{color:hsl(142,76%,36%);font-weight:600;text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="logo.jpg" alt="Pestastic" style="width:180px;height:44px;object-fit:contain" /></div>
    <h1>Pestastic</h1>
    <p>Pest Control Management System</p>
    <div class="spinner"></div>
    <div class="redirect-msg">Redirecting to login… <a href="login.html">Click here</a> if not redirected.</div>
  </div>
  <script>
    // Redirect immediately; meta refresh is the fallback
    window.location.replace('login.html');
  </script>
</body>
</html>
